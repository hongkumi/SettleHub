<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}SettleHub{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; font-family: 'Pretendard', 'Noto Sans KR', sans-serif; }
    .navbar-brand { font-weight: 800; letter-spacing: -0.5px; }
    .status-cell { width: 56px; text-align: center; font-size: .78rem; font-weight: 600; border-radius: 4px; padding: 3px 2px; }
    .status-paid    { background: #d4edda; color: #155724; }
    .status-refused { background: #f8d7da; color: #721c24; }
    .status-pending { background: #fff; color: #adb5bd; border: 1px dashed #dee2e6; }
    .status-na      { background: #fff3cd; color: #856404; font-size: .7rem; }
    .partner-link { color: inherit; text-decoration: none; font-weight: 600; }
    .partner-link:hover { color: #0d6efd; text-decoration: underline; }
    {% block extra_style %}{% endblock %}
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4 py-2">
    <a class="navbar-brand" href="/">⚡ SettleHub</a>
    <span class="text-secondary ms-2 small">제휴정산 현황</span>
    <div class="ms-auto">
      <a href="/api/reload" class="btn btn-outline-light btn-sm">↺ 새로고침</a>
    </div>
  </nav>

  <div class="container-fluid py-4 px-4">
    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block extra_script %}{% endblock %}
</body>
</html>
